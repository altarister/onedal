name: Auto Deploy to AWS EC2

# 자동 배포 로봇 비활성화 (개발 중 비용 청구 방지)
# [알림] 다시 켜려면 아래 on: push 블록의 주석을 해제해주세요!
# on:
#   push:
#     branches:
#       - main
#     paths:
#       - "onedal-web/**" # 웹 폴더가 수정될 때만 배포 발동

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 커밋된 최신 코드 확인
        uses: actions/checkout@v4

      - name: 원격 서버(EC2) 연결 후 배포 스크립트 실행
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_H0ST || secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PEM_KEY }}
          script: |
            # 1. 원달 프로젝트 폴더로 이동 (폴더가 없으면 에러)
            cd ~/onedal/onedal/onedal-web || exit 1
            
            echo "🚀 [1/4] 최신 코드 가져오기"
            git fetch --all
            git reset --hard origin/main
            git pull origin main
            
            echo "📦 [2/4] 핵심 패키지 재설치 (SQLite C++ 빌드 포함)"
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"  # nvm 로드
            
            pnpm install
            pnpm rebuild better-sqlite3 esbuild
            
            echo "🔨 [3/4] 클라이언트 프론트엔드 빌드"
            # 프론트엔드 빌드 (정적 파일 생성)
            cd client && pnpm build && cd ..
            
            # 백엔드는 tsx로 실행되므로 빌드 생략
            
            echo "🔄 [4/4] PM2 서버 재시작 (무중단 갱신)"
            # 구버전 Next.js 엔진 강제 삭제
            pm2 delete all || true
            pm2 start ecosystem.config.cjs --env production
            pm2 save
            
            echo "✅ 배포 완료!"
